<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Important : Empêche le zoom automatique sur les inputs iOS -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>SoundPlay</title>
    <meta
      name="description"
      content="Écoutez et organisez votre musique préférée avec SoundPlay."
    />

    <!-- Lien vers le manifest (indispensable pour la PWA) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icône standard -->
    <link rel="icon" type="image/png" href="/SoundPlay.png" />

    <!-- --- CONFIGURATION SPÉCIFIQUE iOS (APPLE) --- -->

    <!-- Active le mode application (supprime la barre d'adresse Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Définit le style de la barre de statut (en haut) -->
    <!-- 'black-translucent' permet à ton app d'utiliser tout l'écran (sous l'encoche) -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Nom de l'app sur l'écran d'accueil -->
    <meta name="apple-mobile-web-app-title" content="SoundPlay" />

    <!-- Icône utilisée lors de l'ajout à l'écran d'accueil -->
    <link rel="apple-touch-icon" href="/SoundPlay.png" />

    <!-- Thème de couleur pour l'interface système -->
    <meta name="theme-color" content="#121212" />
  </head>
  <body>
    <noscript>
      <div
        style="
          text-align: center;
          padding: 50px;
          color: white;
          background: #121212;
          height: 100vh;
        "
      >
        <h2>JavaScript est requis</h2>
        <p>
          Désolé, SoundPlay ne fonctionne pas sans l'activation de JavaScript.
        </p>
      </div>
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
